spring:
  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/whaleorder
    username: ${DB_USERNAME:whale}
    password: ${DB_PASSWORD:whale}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # Redis (로컬 미설치 시 자동 설정 제외 — 나중에 주석 해제)
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # JPA (개발환경 - 테이블 자동 생성 + SQL 로그)
  jpa:
    hibernate:
      ddl-auto: update   # 기존 데이터 유지, 스키마 변경분만 반영
    show-sql: true

  # 카카오 OAuth2 (실제 키는 환경변수로 주입, 없으면 dev 플레이스홀더 사용)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-client-secret}

# JWT (개발용 기본 시크릿 — 운영 환경에서는 반드시 환경변수로 교체)
jwt:
  secret: ${JWT_SECRET:whale-order-dev-secret-key-minimum-32-characters-long}

logging:
  level:
    com.whale.order: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
