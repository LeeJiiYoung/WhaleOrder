# ─────────────────────────────────────────────────────────────
# 프리티어(t3.micro, RAM 1GB) 경량 배포용 — 필수 4개 서비스만.
# Kafka·모니터링 스택은 제외했다 (아래 설명 참고).
#
#  - Kafka 미사용: application-prod.yaml이 KafkaAutoConfiguration을 제외하고
#    kafka.enabled=false라, 주문 처리는 OrderEventListener의 동기 폴백으로 돈다.
#    (SSE·재고차감·보상 로직은 그대로 동작. 비동기 이점만 포기)
#  - 모니터링(prometheus·grafana)은 docker-compose.monitoring.yml로 분리.
#    필요할 때만 오버레이로 얹는다:
#      docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#  - kafka-ui는 Kafka가 없는 배포 환경에선 무의미 → 로컬 dev(docker-compose.yml)에만 둔다.
# ─────────────────────────────────────────────────────────────
services:

  # ─────────────────────────────────────────
  # Backend (Spring Boot)
  # ─────────────────────────────────────────
  backend:
    image: leejiyoung/whale-order:latest
    container_name: whale-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # JVM 힙 상한 — 1GB 환경에서 힙 폭주로 인한 OOM 방지 (Postgres·Redis와 메모리 공유)
      JAVA_TOOL_OPTIONS: "-Xmx400m -XX:MaxMetaspaceSize=128m"
      DB_HOST: whale-postgres
      DB_PORT: 5432
      DB_NAME: whaleorder
      DB_USERNAME: whale
      DB_PASSWORD: whale
      REDIS_HOST: whale-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    # stdout 로그 로테이션 — 호스트 디스크 무한 증가 방지 (10MB × 3 = 최대 30MB)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # Frontend (React)
  # ─────────────────────────────────────────
  frontend:
    image: leejiyoung/whale-order-frontend:latest
    container_name: whale-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: whale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whaleorder
      POSTGRES_USER: whale
      POSTGRES_PASSWORD: whale
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7
    container_name: whale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - whale-net

volumes:
  postgres-data:
  redis-data:

networks:
  whale-net:
    driver: bridge
