# ─────────────────────────────────────────────────────────────
# 프리티어(t3.micro, RAM 1GB) 경량 배포용 — 필수 4개 서비스만.
# Kafka·모니터링 스택은 제외했다 (아래 설명 참고).
#
#  - Kafka 미사용: application-prod.yaml이 KafkaAutoConfiguration을 제외하고
#    kafka.enabled=false라, 주문 처리는 OrderEventListener의 동기 폴백으로 돈다.
#    (SSE·재고차감·보상 로직은 그대로 동작. 비동기 이점만 포기)
#  - 모니터링(prometheus·grafana)은 docker-compose.monitoring.yml로 분리.
#    필요할 때만 오버레이로 얹는다:
#      docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#  - kafka-ui는 Kafka가 없는 배포 환경에선 무의미 → 로컬 dev(docker-compose.yml)에만 둔다.
# ─────────────────────────────────────────────────────────────
services:

  # ─────────────────────────────────────────
  # Backend (Spring Boot)
  # ─────────────────────────────────────────
  backend:
    image: leejiyoung/whale-order:latest
    container_name: whale-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # JVM 힙 상한 — 1GB 환경에서 힙 폭주로 인한 OOM 방지 (Postgres·Redis와 메모리 공유)
      JAVA_TOOL_OPTIONS: "-Xmx400m -XX:MaxMetaspaceSize=128m"
      DB_HOST: whale-postgres
      DB_PORT: 5432
      DB_NAME: whaleorder
      DB_USERNAME: whale
      DB_PASSWORD: whale
      REDIS_HOST: whale-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      # 로그인 성공 후 프론트로 토큰을 넘길 리다이렉트 주소. .env 에서 도메인 값으로 주입.
      # 미지정 시 application.yaml 기본값(localhost:5173)으로 떨어져 운영에서 로그인이 깨진다.
      OAUTH2_REDIRECT_URI: ${OAUTH2_REDIRECT_URI}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    # stdout 로그 로테이션 — 호스트 디스크 무한 증가 방지 (10MB × 3 = 최대 30MB)
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # Frontend (React)
  # ─────────────────────────────────────────
  frontend:
    image: leejiyoung/whale-order-frontend:latest
    container_name: whale-frontend
    # 외부 노출 제거: 이제 Caddy(443/80)가 유일한 진입점. 프론트는 내부 네트워크로만 통신.
    # (직접 확인이 필요하면 아래 ports 주석을 잠깐 풀어 3000으로 접근 가능)
    # ports:
    #   - "3000:80"
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # Caddy (리버스 프록시 + 자동 HTTPS)
  # ─────────────────────────────────────────
  # DuckDNS 도메인으로 Let's Encrypt 인증서를 자동 발급/갱신하고,
  # 들어온 요청을 frontend nginx(:80)로 넘긴다. frontend가 /api/를 backend로 프록시.
  #   흐름: 브라우저 → Caddy(443) → frontend:80 → (/api) backend:8080
  # ⚠️ 인증서 발급 성공 조건: DuckDNS A레코드가 이 EC2를 가리키고, 보안그룹 80/443 개방.
  caddy:
    image: caddy:2
    container_name: whale-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data      # 발급받은 인증서 보관 (재기동 시 재발급 방지 — rate limit 주의)
      - caddy-config:/config
    depends_on:
      - frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: whale-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whaleorder
      POSTGRES_USER: whale
      POSTGRES_PASSWORD: whale
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - whale-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7
    container_name: whale-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - whale-net

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  whale-net:
    driver: bridge
