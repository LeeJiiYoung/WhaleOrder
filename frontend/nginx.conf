server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router - 새로고침 시 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청은 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}