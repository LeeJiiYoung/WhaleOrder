<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Redis 분산락 동시성 테스트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container { max-width: 800px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    /* 컨트롤 패널 */
    .controls {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.8rem; color: #8b949e; font-weight: 500; }
    .field input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 1rem;
      padding: 8px 14px;
      width: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #388bfd; }

    .btn-start {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 9px 24px;
      transition: background 0.2s;
    }
    .btn-start:hover:not(:disabled) { background: #2ea043; }
    .btn-start:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }

    /* 통계 카드 */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px 20px;
    }

    .stat-label { font-size: 0.78rem; color: #8b949e; margin-bottom: 8px; font-weight: 500; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-card.success .stat-value { color: #3fb950; }
    .stat-card.fail .stat-value { color: #f85149; }
    .stat-card.stock .stat-value { color: #388bfd; }

    /* 재고 프로그레스 바 */
    .progress-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-title { font-size: 0.85rem; color: #8b949e; font-weight: 500; }
    .progress-text { font-size: 0.85rem; color: #e6edf3; font-weight: 600; }

    .progress-bar {
      background: #21262d;
      border-radius: 6px;
      height: 12px;
      overflow: hidden;
    }

    .progress-fill {
      background: linear-gradient(90deg, #388bfd, #58a6ff);
      border-radius: 6px;
      height: 100%;
      width: 100%;
      transition: width 0.4s ease, background 0.4s ease;
    }

    .progress-fill.low { background: linear-gradient(90deg, #f85149, #ff7b72); }
    .progress-fill.mid { background: linear-gradient(90deg, #d29922, #e3b341); }

    /* 실시간 피드 */
    .feed-section {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    .feed-header {
      padding: 16px 20px;
      border-bottom: 1px solid #21262d;
      font-size: 0.85rem;
      color: #8b949e;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .feed-count {
      background: #21262d;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
      color: #8b949e;
    }

    .feed {
      height: 380px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .feed::-webkit-scrollbar { width: 6px; }
    .feed::-webkit-scrollbar-track { background: #161b22; }
    .feed::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      animation: fadeIn 0.25s ease;
      border: 1px solid transparent;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-item.success {
      background: rgba(63, 185, 80, 0.08);
      border-color: rgba(63, 185, 80, 0.2);
    }

    .feed-item.fail {
      background: rgba(248, 81, 73, 0.08);
      border-color: rgba(248, 81, 73, 0.2);
    }

    .thread-badge {
      background: #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.75rem;
      font-weight: 600;
      min-width: 72px;
      padding: 2px 8px;
      text-align: center;
    }

    .status-icon { font-size: 1rem; }
    .feed-message { flex: 1; color: #e6edf3; }
    .feed-remaining { color: #8b949e; font-size: 0.78rem; min-width: 80px; text-align: right; }

    .feed-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #484f58;
      font-size: 0.9rem;
    }

    /* 완료 배너 */
    .complete-banner {
      display: none;
      background: #0d419d22;
      border: 1px solid #388bfd44;
      border-radius: 10px;
      color: #58a6ff;
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 16px;
      padding: 14px 20px;
      text-align: center;
    }

    .complete-banner.show { display: block; }
  </style>
</head>
<body>
<div class="container">

  <h1>🔒 Redis 분산락 동시성 테스트</h1>
  <p class="subtitle">여러 스레드가 동시에 재고를 차감할 때 분산락이 어떻게 동작하는지 확인합니다.</p>

  <!-- 컨트롤 -->
  <div class="controls">
    <div class="field">
      <label>초기 재고</label>
      <input type="number" id="initialStock" value="10" min="1" max="100">
    </div>
    <div class="field">
      <label>동시 요청 수</label>
      <input type="number" id="threadCount" value="30" min="1" max="50">
    </div>
    <button class="btn-start" id="startBtn" onclick="startTest()">테스트 시작</button>
  </div>

  <!-- 통계 카드 -->
  <div class="stats">
    <div class="stat-card success">
      <div class="stat-label">✅ 성공</div>
      <div class="stat-value" id="successCount">0</div>
    </div>
    <div class="stat-card fail">
      <div class="stat-label">❌ 실패 (재고 부족)</div>
      <div class="stat-value" id="failCount">0</div>
    </div>
    <div class="stat-card stock">
      <div class="stat-label">📦 남은 재고</div>
      <div class="stat-value" id="stockDisplay">-</div>
    </div>
  </div>

  <!-- 재고 프로그레스 바 -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">재고 소진율</span>
      <span class="progress-text" id="progressText">-</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- 실시간 피드 -->
  <div class="feed-section">
    <div class="feed-header">
      <span>실시간 결과</span>
      <span class="feed-count" id="feedCount">0개</span>
    </div>
    <div class="feed" id="feed">
      <div class="feed-empty">테스트를 시작하면 결과가 실시간으로 표시됩니다.</div>
    </div>
  </div>

  <div class="complete-banner" id="completeBanner"></div>

</div>

<script>
  let successCount = 0;
  let failCount = 0;
  let initialStock = 0;
  let resultCount = 0;
  let evtSource = null;

  function startTest() {
    if (evtSource) evtSource.close();

    initialStock = parseInt(document.getElementById('initialStock').value) || 10;
    const threadCount = parseInt(document.getElementById('threadCount').value) || 30;

    // 초기화
    successCount = 0;
    failCount = 0;
    resultCount = 0;
    document.getElementById('successCount').textContent = '0';
    document.getElementById('failCount').textContent = '0';
    document.getElementById('stockDisplay').textContent = initialStock;
    document.getElementById('feedCount').textContent = '0개';
    document.getElementById('progressText').textContent = `${initialStock} / ${initialStock}`;
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('progressFill').className = 'progress-fill';
    document.getElementById('completeBanner').className = 'complete-banner';
    document.getElementById('feed').innerHTML = '<div class="feed-empty">스레드 준비 중...</div>';
    document.getElementById('startBtn').disabled = true;

    evtSource = new EventSource(`/demo/stock/stream?initialStock=${initialStock}&threadCount=${threadCount}`);

    evtSource.addEventListener('init', (e) => {
      const data = JSON.parse(e.data);
      document.getElementById('feed').innerHTML = '';
    });

    evtSource.addEventListener('result', (e) => {
      const data = JSON.parse(e.data);
      resultCount++;

      if (data.success) {
        successCount++;
        document.getElementById('successCount').textContent = successCount;
        if (data.remaining >= 0) {
          document.getElementById('stockDisplay').textContent = data.remaining;
          updateProgress(data.remaining);
        }
      } else {
        failCount++;
        document.getElementById('failCount').textContent = failCount;
      }

      document.getElementById('feedCount').textContent = `${resultCount}개`;
      appendFeedItem(data);
    });

    evtSource.addEventListener('complete', (e) => {
      const data = JSON.parse(e.data);
      document.getElementById('stockDisplay').textContent = data.finalStock;
      updateProgress(data.finalStock);

      const banner = document.getElementById('completeBanner');
      banner.textContent = `✅ 완료 — 성공 ${data.successCount}건 / 실패 ${data.failCount}건 / 최종 재고 ${data.finalStock}개`;
      banner.className = 'complete-banner show';

      document.getElementById('startBtn').disabled = false;
      evtSource.close();
    });

    evtSource.onerror = () => {
      document.getElementById('startBtn').disabled = false;
      evtSource.close();
    };
  }

  function updateProgress(remaining) {
    const pct = initialStock > 0 ? Math.max(0, (remaining / initialStock) * 100) : 0;
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill' + (pct <= 20 ? ' low' : pct <= 50 ? ' mid' : '');
    document.getElementById('progressText').textContent = `${remaining} / ${initialStock}`;
  }

  function appendFeedItem(data) {
    const feed = document.getElementById('feed');
    const item = document.createElement('div');
    item.className = `feed-item ${data.success ? 'success' : 'fail'}`;

    const remainingText = data.success && data.remaining >= 0
      ? `남은 재고 ${data.remaining}개`
      : '';

    item.innerHTML = `
      <span class="thread-badge">Thread ${String(data.threadId).padStart(2, ' ')}</span>
      <span class="status-icon">${data.success ? '✅' : '❌'}</span>
      <span class="feed-message">${data.message}</span>
      <span class="feed-remaining">${remainingText}</span>
    `;

    feed.appendChild(item);
    feed.scrollTop = feed.scrollHeight;
  }
</script>
</body>
</html>
