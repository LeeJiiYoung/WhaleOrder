spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

  kafka:
    listener:
      auto-startup: true
    # @EmbeddedKafka가 있으면 해당 브로커 주소 사용, 없으면 localhost:9092 폴백
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

  # OAuth2 테스트용 더미값
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-client-id
            client-secret: test-client-secret
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  secret: test-secret-key-minimum-32-characters-long-for-hs256
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000

app:
  oauth2:
    redirect-uri: http://localhost:5173/oauth2/callback
  upload:
    menu-dir: ./uploads/menus
    url-prefix: /uploads/menus
