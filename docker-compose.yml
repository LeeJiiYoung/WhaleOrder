services:

  # ─────────────────────────────────────────
  # Backend (Spring Boot)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siren-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/whaleorder
      SPRING_DATASOURCE_USERNAME: whale
      SPRING_DATASOURCE_PASSWORD: whale
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Frontend (React)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: siren-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: siren-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whaleorder
      POSTGRES_USER: whale
      POSTGRES_PASSWORD: whale
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7
    container_name: siren-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Kafka + Zookeeper
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: siren-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - siren-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: siren-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Prometheus
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: siren-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: siren-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin1234
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - siren-net

  # ─────────────────────────────────────────
  # Elasticsearch (선택)
  # ─────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: siren-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - siren-net

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  es-data:

networks:
  siren-net:
    driver: bridge
