server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router - 새로고침 시 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청은 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE(실시간 주문 상태 푸시) 대응 — 버퍼링을 끄고 롱리브드 커넥션 유지.
        # Caddy → nginx → backend 로 프록시 계층이 늘어나면 버퍼링 시 이벤트가 뭉쳐 전달된다.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}