spring:
  # Kafka 미사용 (프리티어 배포 시 제외)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # t2.micro(1GB) 기준 — 풀을 작게 유지해 Postgres 연결당 프로세스 메모리를 절약
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1800000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # JPA (운영환경 - SQL 로그 미출력)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Tomcat 스레드 축소 — 스레드당 스택(~1MB) 누적을 줄여 메모리 절감 (기본 max 200 → 50)
server:
  tomcat:
    threads:
      max: 50
      min-spare: 5

logging:
  level:
    com.whale.order: INFO
