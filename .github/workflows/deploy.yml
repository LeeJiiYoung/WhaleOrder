name: Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 백엔드 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/whale-order:latest

      - name: 프론트엔드 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/whale-order-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            if [ ! -d ~/whale-order ]; then
              git clone https://github.com/LeeJiiYoung/WhaleOrder ~/whale-order
            else
              cd ~/whale-order && git pull
            fi
            cd ~/whale-order
            # 새 이미지를 먼저 받아 다운타임을 최소화 (기존 컨테이너는 계속 실행)
            docker-compose -f docker-compose.prod.yml pull backend frontend
            # 이전 배포가 OOM 등으로 중단되며 남은 컨테이너를 명시적으로 제거한다.
            # 정상 컨테이너(whale-backend)뿐 아니라 재생성 중 임시 리네임된
            # <hash>_whale-backend 좀비까지 이름 substring 매칭으로 함께 정리 → Conflict 방지.
            docker ps -aq -f name=whale-backend -f name=whale-frontend | xargs -r docker rm -f
            # --force-recreate 없이 up: 위에서 이미 제거했으므로 깨끗이 새로 생성된다.
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans backend frontend