# Caddy가 넘긴 X-Forwarded-Proto 를 그대로 전파한다.
# nginx는 Caddy로부터 http로 받으므로 $scheme 은 항상 http → 원래 값(https)을 잃는다.
# 들어온 헤더가 비어 있으면(프록시 없이 직접 접근) $scheme 으로 폴백.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React Router - 새로고침 시 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 요청은 백엔드로 프록시
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 프록시 뒤 원래 scheme/host 를 백엔드로 전달 → Spring forward-headers-strategy 가
        # OAuth2 {baseUrl} 을 https://whaleorder.duckdns.org 로 복원하는 데 사용한다.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;

        # SSE(실시간 주문 상태 푸시) 대응 — 버퍼링을 끄고 롱리브드 커넥션 유지.
        # Caddy → nginx → backend 로 프록시 계층이 늘어나면 버퍼링 시 이벤트가 뭉쳐 전달된다.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}