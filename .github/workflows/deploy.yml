name: Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/whale-order:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/whale-order:latest
            docker stop whale-backend || true
            docker rm whale-backend || true
            docker run -d \
              --name whale-backend \
              --network whale-net \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://whale-postgres:5432/whaleorder \
              -e SPRING_DATASOURCE_USERNAME=whale \
              -e SPRING_DATASOURCE_PASSWORD=whale \
              -e SPRING_REDIS_HOST=whale-redis \
              -e SPRING_REDIS_PORT=6379 \
              -e SPRING_KAFKA_BOOTSTRAP_SERVERS=whale-kafka:9092 \
              ${{ secrets.DOCKER_USERNAME }}/whale-order:latest