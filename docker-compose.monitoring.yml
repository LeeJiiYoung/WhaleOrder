# ─────────────────────────────────────────────────────────────
# 모니터링 오버레이 — prometheus + grafana.
# 평소 배포에선 띄우지 않고(메모리 절약), 지표를 봐야 할 때만 prod와 함께 얹는다:
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
# 같은 -f 세트로 실행하면 하나의 프로젝트로 합쳐져 whale-net을 공유하므로,
# prometheus가 backend 컨테이너를 서비스명으로 스크랩할 수 있다.
#
# ※ t3.micro(1GB)에선 이 둘을 함께 올리면 메모리가 빠듯하다.
#   상시 구동보다는 시연/점검 시 잠깐 up → 확인 후 down 을 권장.
# ─────────────────────────────────────────────────────────────
services:

  prometheus:
    image: prom/prometheus:latest
    container_name: whale-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - whale-net

  grafana:
    image: grafana/grafana:10.4.3
    container_name: whale-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin1234
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - whale-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  whale-net:
    driver: bridge
